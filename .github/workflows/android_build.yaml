name: Android 构建检查

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: 准备构建信息
    runs-on: ubuntu-latest
    outputs:
      application_id: ${{ steps.app.outputs.application_id }}
      version_name: ${{ steps.app.outputs.version_name }}
      version_code: ${{ steps.app.outputs.version_code }}
      ref_name: ${{ steps.app.outputs.ref_name }}
      short_sha: ${{ steps.app.outputs.short_sha }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 读取应用信息
        id: app
        shell: bash
        run: |
          application_id=$(grep -m1 'applicationId = "' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          version_name=$(grep -m1 'versionName = "' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          version_code=$(grep -m1 'versionCode = ' app/build.gradle.kts | sed -E 's/.*= ([0-9]+).*/\1/')
          ref_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          short_sha=$(git rev-parse --short HEAD)

          if [ -z "$application_id" ] || [ -z "$version_name" ] || [ -z "$version_code" ]; then
            echo "::error::无法从 app/build.gradle.kts 读取应用信息"
            exit 1
          fi

          if ! [[ "$version_name" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::versionName 格式无效：$version_name"
            echo "期望格式：x.y.z"
            exit 1
          fi

          echo "application_id=$application_id" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "ref_name=$ref_name" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      - name: 输出预构建信息
        shell: bash
        run: |
          echo "============================================"
          echo "📦 应用 ID:     ${{ steps.app.outputs.application_id }}"
          echo "🏷️ 版本名称:    ${{ steps.app.outputs.version_name }}"
          echo "🔢 版本号:      ${{ steps.app.outputs.version_code }}"
          echo "🌿 分支或来源:  ${{ steps.app.outputs.ref_name }}"
          echo "🧾 提交短哈希:  ${{ steps.app.outputs.short_sha }}"
          echo "============================================"

      - name: 验证签名配置可行性
        shell: bash
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          has_signing=true
          for key in KEYSTORE KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              has_signing=false
              break
            fi
          done

          if [ "$has_signing" = "false" ]; then
            echo "::warning::未配置完整签名 Secrets，跳过签名可行性校验"
            exit 0
          fi

          keystore_path="${RUNNER_TEMP}/release.jks"
          printf '%s' "${KEYSTORE}" | base64 --decode > "${keystore_path}"
          keytool -list -keystore "${keystore_path}" \
            -storepass "${KEYSTORE_PASSWORD}" \
            -alias "${KEY_ALIAS}" > /dev/null
          echo "签名校验通过"

  verify:
    name: 测试与检查
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 输出预构建信息
        shell: bash
        run: |
          echo "============================================"
          echo "📦 应用 ID:     ${{ needs.prepare.outputs.application_id }}"
          echo "🏷️ 版本名称:    ${{ needs.prepare.outputs.version_name }}"
          echo "🔢 版本号:      ${{ needs.prepare.outputs.version_code }}"
          echo "🌿 分支或来源:  ${{ needs.prepare.outputs.ref_name }}"
          echo "🧾 提交短哈希:  ${{ needs.prepare.outputs.short_sha }}"
          echo "============================================"

      - name: 配置 JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          validate-wrappers: true
          cache-cleanup: on-success

      - name: 授予 Gradle Wrapper 执行权限
        shell: bash
        run: chmod +x ./gradlew

      - name: 运行本地测试
        run: ./gradlew test

      - name: 执行 Ktlint 检查
        run: ./gradlew ktlintCheck

      - name: 上传构建报告
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-reports
          path: app/build/reports

  build:
    name: 构建 Debug 安装包 (${{ matrix.abi }})
    needs: [prepare, verify]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
          - abi: x86_64
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 输出预构建信息
        shell: bash
        run: |
          echo "============================================"
          echo "📦 应用 ID:     ${{ needs.prepare.outputs.application_id }}"
          echo "🏷️ 版本名称:    ${{ needs.prepare.outputs.version_name }}"
          echo "🔢 版本号:      ${{ needs.prepare.outputs.version_code }}"
          echo "🌿 分支或来源:  ${{ needs.prepare.outputs.ref_name }}"
          echo "🧾 提交短哈希:  ${{ needs.prepare.outputs.short_sha }}"
          echo "🧱 目标架构:    ${{ matrix.abi }}"
          echo "============================================"

      - name: 配置 JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          validate-wrappers: true
          cache-cleanup: on-success

      - name: 授予 Gradle Wrapper 执行权限
        shell: bash
        run: chmod +x ./gradlew

      - name: 构建 Debug 安装包
        run: ./gradlew assembleDebug -PabiFilter=${{ matrix.abi }}

      - name: 整理调试产物
        shell: bash
        run: |
          mkdir -p build/output
          cp "./app/build/outputs/apk/debug/app-${{ matrix.abi }}-debug.apk" \
            "./build/output/one-player-${{ matrix.abi }}-debug.apk"

      - name: 上传调试产物
        uses: actions/upload-artifact@v7
        with:
          name: one-player-${{ matrix.abi }}-debug.apk
          path: ./build/output/

  auto-release:
    name: 自动触发发布
    needs: [prepare, verify, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 检查版本号和更新日志
        id: check
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version_name }}"
          tag="v${version}"

          if git tag -l "$tag" | grep -q .; then
            echo "标签 $tag 已存在，跳过发布"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$latest_tag" ]; then
            changelog_changed=$(git diff --name-only "$latest_tag" HEAD -- .github/CHANGELOG.md | wc -l)
          else
            changelog_changed=1
          fi

          if [ "$changelog_changed" -eq 0 ]; then
            echo "更新日志未变更，跳过发布"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "版本 $version 待发布，更新日志已更新"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: 推送版本标签并触发发布
        if: steps.check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version="${{ needs.prepare.outputs.version_name }}"
          tag="v${version}"
          git tag "$tag"
          git push origin "$tag"
          gh workflow run publish.yaml -f version="${version}" -f create_release=true
