name: Auto Unsigned Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate short SHA
        id: set-short-sha
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Unsigned APKs with Gradle
        run: ./gradlew assembleRelease --warning-mode all

      - name: Upload arm64-v8a Artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-player-arm64-v8a-unsigned-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/release/*arm64-v8a*.apk

      - name: Upload x86_64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-player-x86_64-unsigned-${{ env.SHORT_SHA }}
          path: app/build/outputs/apk/release/*x86_64*.apk
