name: Android 正式版发布

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号，例如 0.15.4'
        required: false
        type: string
      create_release:
        description: '是否创建 GitHub 发布'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: 准备发布信息
    runs-on: ubuntu-latest
    outputs:
      application_id: ${{ steps.app.outputs.application_id }}
      version_name: ${{ steps.app.outputs.version_name }}
      version_code: ${{ steps.app.outputs.version_code }}
      release_version: ${{ steps.release.outputs.release_version }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      ref_name: ${{ steps.release.outputs.ref_name }}
      short_sha: ${{ steps.release.outputs.short_sha }}
      release_notes: ${{ steps.notes.outputs.release_notes }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 读取应用信息
        id: app
        shell: bash
        run: |
          application_id=$(grep -m1 'applicationId = "' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          version_name=$(grep -m1 'versionName = "' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          version_code=$(grep -m1 'versionCode = ' app/build.gradle.kts | sed -E 's/.*= ([0-9]+).*/\1/')

          if [ -z "$application_id" ] || [ -z "$version_name" ] || [ -z "$version_code" ]; then
            echo "::error::无法从 app/build.gradle.kts 读取应用信息"
            exit 1
          fi

          echo "application_id=$application_id" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"

      - name: 解析发布版本
        id: release
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME}"
          short_sha=$(git rev-parse --short HEAD)

          if [ -n "${{ github.event.inputs.version }}" ]; then
            release_version="${{ github.event.inputs.version }}"
            echo "📝 使用手动输入版本：$release_version"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF#refs/tags/v}"
            echo "🏷️ 从标签读取版本：$release_version"
          else
            echo "::error::无法确定发布版本号，请提供 workflow_dispatch 输入或推送 v*.*.* 标签"
            exit 1
          fi

          if ! [[ "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::发布版本号格式无效：$release_version"
            echo "期望格式：x.y.z"
            exit 1
          fi

          release_tag="v$release_version"

          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "ref_name=$ref_name" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      - name: 校验版本号一致性
        shell: bash
        run: |
          release_version="${{ steps.release.outputs.release_version }}"
          actual_version_name="${{ steps.app.outputs.version_name }}"
          actual_version_code="${{ steps.app.outputs.version_code }}"

          echo "🔍 版本对比信息："
          echo "  发布版本：      $release_version"
          echo "  versionName：   $actual_version_name"
          echo "  versionCode：   $actual_version_code"

          if [ "$release_version" != "$actual_version_name" ]; then
            echo "::error::发布版本号与 app/build.gradle.kts 中的 versionName 不一致"
            echo "请将 versionName 更新为 $release_version，或改用 release/v$actual_version_name 分支"
            exit 1
          fi

          echo "✅ 版本号校验通过"

      - name: 验证签名配置
        shell: bash
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          for key in KEYSTORE KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::缺少必需 Secret: ${key}"
              exit 1
            fi
          done

          keystore_path="${RUNNER_TEMP}/release.jks"
          printf '%s' "${KEYSTORE}" | base64 --decode > "${keystore_path}"
          keytool -list -keystore "${keystore_path}" \
            -storepass "${KEYSTORE_PASSWORD}" \
            -alias "${KEY_ALIAS}" > /dev/null
          echo "✅ 签名校验通过"

      - name: 读取并展示更新日志
        id: notes
        shell: bash
        run: |
          changelog_file=".github/CHANGELOG.md"
          if [ ! -f "${changelog_file}" ]; then
            echo "::error::缺少更新日志文件: ${changelog_file}"
            exit 1
          fi

          cat "${changelog_file}" > release_notes.md
          echo "========== 本次更新日志 =========="
          cat release_notes.md

          release_notes=$(base64 -w 0 release_notes.md)
          echo "release_notes=${release_notes}" >> "$GITHUB_OUTPUT"

      - name: 输出预构建信息
        shell: bash
        run: |
          echo "============================================"
          echo "📦 应用 ID:     ${{ steps.app.outputs.application_id }}"
          echo "🏷️ 版本名称:    ${{ steps.app.outputs.version_name }}"
          echo "🔢 版本号:      ${{ steps.app.outputs.version_code }}"
          echo "🚀 发布版本:    ${{ steps.release.outputs.release_version }}"
          echo "🏷️ 发布标签:    ${{ steps.release.outputs.release_tag }}"
          echo "🌿 分支名称:    ${{ steps.release.outputs.ref_name }}"
          echo "🧾 提交短哈希:  ${{ steps.release.outputs.short_sha }}"
          echo "============================================"

  build:
    name: 签名构建 (${{ matrix.abi }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
          - abi: x86_64
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 输出预构建信息
        shell: bash
        run: |
          echo "============================================"
          echo "📦 应用 ID:     ${{ needs.prepare.outputs.application_id }}"
          echo "🏷️ 版本名称:    ${{ needs.prepare.outputs.version_name }}"
          echo "🔢 版本号:      ${{ needs.prepare.outputs.version_code }}"
          echo "🚀 发布版本:    ${{ needs.prepare.outputs.release_version }}"
          echo "🏷️ 发布标签:    ${{ needs.prepare.outputs.release_tag }}"
          echo "🌿 分支名称:    ${{ needs.prepare.outputs.ref_name }}"
          echo "🧾 提交短哈希:  ${{ needs.prepare.outputs.short_sha }}"
          echo "🧱 目标架构:    ${{ matrix.abi }}"
          echo "============================================"

      - name: 配置 JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          validate-wrappers: true

      - name: 授予 Gradle Wrapper 执行权限
        shell: bash
        run: chmod +x ./gradlew

      - name: 准备签名文件
        id: signing
        shell: bash
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          keystore_path="${RUNNER_TEMP}/release.jks"
          printf '%s' "${KEYSTORE}" | base64 --decode > "${keystore_path}"
          keytool -list -keystore "${keystore_path}" \
            -storepass "${KEYSTORE_PASSWORD}" \
            -alias "${KEY_ALIAS}" > /dev/null
          echo "keystore_path=${keystore_path}" >> "$GITHUB_OUTPUT"

      - name: 写入发布日志
        shell: bash
        run: |
          printf '%s' '${{ needs.prepare.outputs.release_notes }}' | base64 --decode > release_notes.md
          cat release_notes.md

      - name: 构建已签名正式版
        shell: bash
        run: |
          ./gradlew clean assembleRelease -PabiFilter=${{ matrix.abi }} \
            -Pandroid.injected.signing.store.file="${{ steps.signing.outputs.keystore_path }}" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: 校验构建产物
        shell: bash
        run: |
          required_file="app/build/outputs/apk/release/app-${{ matrix.abi }}-release.apk"
          if [ ! -f "${required_file}" ]; then
            echo "::error::缺少构建产物：${required_file}"
            exit 1
          fi

          echo "✅ 构建产物校验通过"

      - name: 整理发布产物
        run: |
          mkdir -p build/output
          cp "app/build/outputs/apk/release/app-${{ matrix.abi }}-release.apk" \
            "build/output/one-player-v${{ needs.prepare.outputs.release_version }}-${{ matrix.abi }}.apk"

      - name: 上传发布产物
        uses: actions/upload-artifact@v7
        with:
          name: one-player-release-${{ needs.prepare.outputs.release_version }}-${{ matrix.abi }}
          path: build/output/

  release:
    name: 创建 GitHub 发布
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.create_release == 'true' }}
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v8
        with:
          pattern: one-player-release-${{ needs.prepare.outputs.release_version }}-*
          path: release
          merge-multiple: true

      - name: 写入发布日志
        shell: bash
        run: |
          printf '%s' '${{ needs.prepare.outputs.release_notes }}' | base64 --decode > release_notes.md
          cat release_notes.md

      - name: 创建 GitHub 发布
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: release/*.apk
          overwrite_files: true
          draft: false
          name: One Player ${{ needs.prepare.outputs.release_tag }}
          body_path: release_notes.md
          tag_name: ${{ needs.prepare.outputs.release_tag }}
